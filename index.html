<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>烏丸線 時刻表</title>
<meta name="theme-color" content="#0f0f10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="電車">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#0f0f10; --card:#1a1a1c; --line:rgba(255,255,255,.09);
    --ink:#f1f1f1; --sub:#9b9a96; --hint:#65645f;
    --grn:#3fcca1; --grnbg:#123a30;      /* 竹田・国際会館行 */
    --kin:#e0a84e; --kinbg:#3a2e12;      /* 近鉄線直通(新田辺・近鉄奈良) */
    --next:#3a3216; --nextline:#8a7426; --nextink:#f3da8a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
  html{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.4;
    height:100vh; height:100dvh; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{position:fixed;inset:0;max-width:480px;margin:0 auto;display:flex;flex-direction:column;
    padding-top:max(16px,env(safe-area-inset-top));padding-left:14px;padding-right:14px;padding-bottom:8px;}
  .hd{flex-shrink:0}
  #list{flex:1 1 0;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
  #list::-webkit-scrollbar{width:0;height:0;display:none}
  h1{font-size:17px;font-weight:600;letter-spacing:.01em}
  .meta{font-size:11px;color:var(--hint);margin:7px 0 0;text-align:center}
  .route{font-size:22px;font-weight:600;color:var(--ink);margin:2px 2px 9px;display:flex;align-items:center;justify-content:center;gap:9px;flex-wrap:wrap}
  .dots{display:flex;justify-content:center;gap:11px;margin:0 0 14px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--hint);cursor:pointer;transition:background .15s,transform .15s}
  .dot.on{background:var(--ink);transform:scale(1.3)}
  .route .ar{color:var(--grn);font-weight:500}
  .card{background:var(--card);border:.5px solid var(--line);border-radius:14px;overflow:hidden}
  .row{display:flex;align-items:center;gap:10px;padding:13px 15px;border-top:.5px solid var(--line)}
  .row:first-child{border-top:none}
  .b{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:22px;padding:0 7px;border-radius:6px;font-size:12.5px;font-weight:700;flex-shrink:0;white-space:nowrap}
  .bg{background:var(--grnbg);color:var(--grn)}
  .bk{background:var(--kinbg);color:var(--kin)}
  .time{display:flex;align-items:center;gap:8px;font-size:18px;font-variant-numeric:tabular-nums;letter-spacing:.01em}
  .time b{font-weight:600}
  .time .to{color:var(--hint);font-size:15px}
  .time .arr{color:var(--sub);font-weight:500}
  .row .right{margin-left:auto;display:flex;align-items:center;gap:9px}
  .dur{font-size:13px;color:var(--sub);font-variant-numeric:tabular-nums;white-space:nowrap}
  .row.next{background:var(--next)}
  .tagwrap{flex:1;display:flex;justify-content:center;align-items:center}
  .row.next .tag{font-size:20px;font-weight:700;color:var(--nextink);background:rgba(0,0,0,.25);border:.5px solid var(--nextline);border-radius:99px;padding:4px 14px;white-space:nowrap}
  .foot{flex-shrink:0;margin-top:13px;padding:0 4px;font-size:11px;color:var(--hint);line-height:1.7}
  #status{text-align:center;font-size:14px;font-weight:700;margin-bottom:4px;letter-spacing:.04em}
  .legend{display:flex;justify-content:center;gap:14px;margin-top:6px;font-size:13px;color:var(--sub)}
  .legend span{display:flex;align-items:center;gap:6px}
  .legend i{width:13px;height:13px;border-radius:3px;display:inline-block;flex-shrink:0}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="route" id="route"></div>
    <div class="dots" id="dots">
      <span class="dot" id="d-go" onclick="show('go')" role="button" aria-label="行き"></span>
      <span class="dot" id="d-back" onclick="show('back')" role="button" aria-label="帰り"></span>
    </div>
  </div>
  <div class="card" id="list"></div>

  <div class="foot">
    <div id="status"></div>
    <div class="legend">
      <span><i style="background:var(--grn)"></i>竹田・国際会館 行</span>
      <span><i style="background:var(--kin)"></i>新田辺・近鉄奈良 行</span>
    </div>
    <div class="meta" id="rev"></div>
  </div>
</div>

<script>
var DATA=null,CURRENT='go';
function toMin(t){var p=t.split(":");return +p[0]*60+ +p[1];}

// --- 日本の祝日判定（固定日・ハッピーマンデー・春分秋分・振替休日） ---
function jpHolidaySet(y){
  var H={},mk=function(m,d){H[m+"-"+d]=1;};
  mk(1,1);mk(2,11);mk(2,23);mk(4,29);mk(5,3);mk(5,4);mk(5,5);mk(8,11);mk(11,3);mk(11,23);
  function nthMon(m,n){var f=new Date(y,m-1,1).getDay();return 1+((8-f)%7)+(n-1)*7;}
  mk(1,nthMon(1,2));   // 成人の日
  mk(7,nthMon(7,3));   // 海の日
  mk(9,nthMon(9,3));   // 敬老の日
  mk(10,nthMon(10,2)); // スポーツの日
  var sp=Math.floor(20.8431+0.242194*(y-1980)-Math.floor((y-1980)/4));
  var au=Math.floor(23.2488+0.242194*(y-1980)-Math.floor((y-1980)/4));
  mk(3,sp);mk(9,au);
  // 振替休日: 祝日が日曜なら翌日(祝日でない最初の平日)を休日に
  var base=Object.keys(H).slice();
  base.forEach(function(k){
    var p=k.split("-"),dt=new Date(y,p[0]-1,+p[1]);
    if(dt.getDay()===0){var n=new Date(dt);do{n.setDate(n.getDate()+1);}while(H[(n.getMonth()+1)+"-"+n.getDate()]);H[(n.getMonth()+1)+"-"+n.getDate()]=1;}
  });
  return H;
}
function isHolidayType(d){
  var w=d.getDay();
  if(w===0||w===6)return true;                       // 土日
  return !!jpHolidaySet(d.getFullYear())[(d.getMonth()+1)+"-"+d.getDate()]; // 祝日
}

function show(k){
  CURRENT=k;
  document.getElementById('d-go').className='dot'+(k==='go'?' on':'');
  document.getElementById('d-back').className='dot'+(k==='back'?' on':'');
  if(!DATA)return;
  var now=new Date(),holi=isHolidayType(now);
  var set=holi?DATA.holiday:DATA.weekday,d=set[k];
  document.getElementById('route').innerHTML=d.from+' 発 <span class="ar">→</span> '+d.to+' 着';
  var nm=now.getHours()*60+now.getMinutes(),done=false,html='';
  d.trips.forEach(function(tr){
    var dest=tr[0],dep=tr[1],arr=tr[2];
    var nx=!done&&toMin(dep)>=nm;if(nx)done=true;
    var dur=toMin(arr)-toMin(dep);if(dur<0)dur+=1440; // 0:xx着(翌日)の補正
    var thru=(dest==='新田辺'||dest==='近鉄奈良');
    html+='<div class="row'+(nx?' next':'')+'"'+(nx?' id="nextt"':'')+'>'
      +'<span class="b '+(thru?'bk':'bg')+'">'+dest+'</span>'
      +'<span class="time"><b>'+dep+'</b><span class="to">→</span><b class="arr">'+arr+'</b></span>'
      +(nx?'<span class="tagwrap"><span class="tag">次発</span></span>':'')
      +'<span class="right"><span class="dur">'+dur+'分</span></span>'
      +'</div>';
  });
  var list=document.getElementById('list');
  list.scrollTop=0;list.innerHTML=html;
  var nb=document.getElementById('nextt');
  if(nb){var lr=list.getBoundingClientRect(),nr=nb.getBoundingClientRect();
    list.scrollTop+=(nr.top-lr.top)-(list.clientHeight-nr.height)/2;}
}
function defaultView(){return new Date().getHours()<12?'go':'back';}
function refresh(){
  if(!DATA)return;
  var now=new Date(),st=document.getElementById('status'),holi=isHolidayType(now);
  st.textContent=holi?'土曜・休日ダイヤ':'平日ダイヤ';
  st.style.color=holi?'var(--kin)':'var(--grn)';
  show(defaultView());
}
(function(){
  fetch('timetable.json').then(function(r){return r.json();}).then(function(j){
    DATA=j;
    document.getElementById('rev').textContent=j.source;
    refresh();
  }).catch(function(){
    document.getElementById('list').innerHTML='<div class="row">時刻表を読み込めませんでした。通信環境をご確認のうえ再読み込みしてください。</div>';
  });
})();
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible')refresh();});
window.addEventListener('pageshow',function(){refresh();});
(function(){
  var sx=0,sy=0,tracking=false;
  document.addEventListener('touchstart',function(e){
    if(e.touches.length!==1){tracking=false;return;}
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;tracking=true;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!tracking)return;tracking=false;
    var t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;
    if(Math.abs(dx)<50||Math.abs(dx)<Math.abs(dy)*1.5)return;
    show(dx<0?'back':'go');
  },{passive:true});
})();
if('serviceWorker' in navigator){
  var hadController=!!navigator.serviceWorker.controller,reloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(reloaded)return;
    if(hadController){reloaded=true;location.reload();}
    hadController=true;
  });
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      document.addEventListener('visibilitychange',function(){
        if(document.visibilityState==='visible')reg.update().catch(function(){});
      });
    }).catch(function(){});
  });
}
</script>
</body>
</html>
